<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Fish Monte PRO</title>

  <!-- CSS -->
  <link rel="stylesheet" href="./style.css">

  <!-- ================= PWA ================= -->
<link rel="manifest" href="./manifest.json">
<meta name="theme-color" content="#0f6bff">
<link rel="apple-touch-icon" href="./icons/icon-180.png">
  <!-- Manifest -->
  <link rel="manifest" href="./manifest.json">

  <!-- Theme -->
  <meta name="theme-color" content="#0b5ed7">
  <meta name="mobile-web-app-capable" content="yes">

  <!-- iOS Support -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="FishMonte">

  <!-- Favicon -->
  <link rel="icon" type="image/png" sizes="32x32" href="./icons/icon-32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="./icons/icon-16.png">

  <!-- iOS Icon (ГОЛОВНЕ) -->
  <link rel="apple-touch-icon" href="./icons/icon-180.png">

</head>
<script>
window.addEventListener("load", () => {
  setTimeout(() => {
    const loader = document.getElementById("appLoader");
    loader.style.opacity = "0";
    loader.style.transition = "opacity 0.4s ease";
    setTimeout(() => loader.remove(), 400);
  }, 500);
});
</script>
<body>
<div id="appLoader" style="
  position:fixed;
  inset:0;
  background:#0b5ed7;
  display:flex;
  align-items:center;
  justify-content:center;
  flex-direction:column;
  color:white;
  z-index:99999;
">
  <img src="icons/icon-192.png" width="80" style="margin-bottom:20px;">
  <div class="loader"></div>
</div>
  <!-- Update Banner -->
  <div id="updateBanner" style="
    display:none;
    position:fixed;
    bottom:20px;
    left:50%;
    transform:translateX(-50%);
    background:#0b5ed7;
    color:white;
    padding:12px 20px;
    border-radius:8px;
    box-shadow:0 5px 15px rgba(0,0,0,0.3);
    z-index:9999;">
    Доступне оновлення 🚀
    <button id="updateBtn" style="
      margin-left:10px;
      background:white;
      color:#0b5ed7;
      border:none;
      padding:5px 10px;
      border-radius:5px;
      cursor:pointer;">
      Оновити
    </button>
  </div>

  <div id="authScreen">
    <h2>Вхід</h2>
    <input type="email" id="email" placeholder="Email">
    <input type="password" id="password" placeholder="Пароль">
    <button id="loginBtn">Увійти</button>
    <button id="registerBtn">Реєстрація</button>
    <p id="authError" style="color:red;"></p>
  </div>

  <div id="app" style="display:none;">
    <h2>Система запущена ✅</h2>
    <button id="logoutBtn">Вийти</button>
  </div>

  <!-- Firebase SDK -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, onAuthStateChanged, signOut } 
    from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
    import { getFirestore } 
    from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyDDroTHvtLRlgzsYvZzZ6ouabAj7gZ-9A0",
      authDomain: "oblik-stavka.firebaseapp.com",
      projectId: "oblik-stavka"
    };

    const firebaseApp = initializeApp(firebaseConfig);
    const auth = getAuth(firebaseApp);
    const db = getFirestore(firebaseApp);

    window.firebaseAuth = auth;
    window.firebaseDB = db;
    window.firebaseFns = {
      createUserWithEmailAndPassword,
      signInWithEmailAndPassword,
      onAuthStateChanged,
      signOut
    };
  </script>

  <!-- Main App -->
  <script type="module" src="./app.js"></script>

  <!-- Service Worker with Auto Update -->
  <script>
  if ("serviceWorker" in navigator) {
    navigator.serviceWorker.register("sw.js").then(reg => {

      reg.onupdatefound = () => {
        const newWorker = reg.installing;

        newWorker.onstatechange = () => {
          if (newWorker.state === "installed" && navigator.serviceWorker.controller) {
            document.getElementById("updateBanner").style.display = "block";
          }
        };
      };

    });

    document.getElementById("updateBtn").addEventListener("click", () => {
      window.location.reload();
    });
  }
  </script>
<script>
  if ("serviceWorker" in navigator) {
    navigator.serviceWorker.register("./sw.js")
      .then(reg => {
        console.log("Service Worker Registered");
      })
      .catch(err => console.log("SW error:", err));
  }
</script>
  
</body>
</html>
