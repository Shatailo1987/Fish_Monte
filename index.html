<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fish Monte PRO</title>

  <!-- CSS -->
  <link rel="stylesheet" href="style.css">

  <!-- Favicon -->
  <link rel="icon" href="favicon.ico">
  <link rel="icon" sizes="16x16" href="icons/icon-16.png">
  <link rel="icon" sizes="32x32" href="icons/icon-32.png">

  <!-- PWA -->
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#0b5ed7">
<meta name="background-color" content="#0b5ed7">
  <!-- iOS App Mode -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="FishMonte">
  <link rel="apple-touch-icon" sizes="180x180" href="icons/icon-180.png">

  <!-- iOS Splash Screens -->
  <link rel="apple-touch-startup-image" href="splash-1290x2796.png"
    media="(device-width: 430px) and (device-height: 932px) and (-webkit-device-pixel-ratio: 3)">
  <link rel="apple-touch-startup-image" href="splash-1179x2556.png"
    media="(device-width: 393px) and (device-height: 852px) and (-webkit-device-pixel-ratio: 3)">
  <link rel="apple-touch-startup-image" href="splash-1170x2532.png"
    media="(device-width: 390px) and (device-height: 844px) and (-webkit-device-pixel-ratio: 3)">
  <link rel="apple-touch-startup-image" href="splash-1284x2778.png"
    media="(device-width: 428px) and (device-height: 926px) and (-webkit-device-pixel-ratio: 3)">
  <link rel="apple-touch-startup-image" href="splash-1125x2436.png"
    media="(device-width: 375px) and (device-height: 812px) and (-webkit-device-pixel-ratio: 3)">
</head>

<body>

  <!-- Update Banner -->
  <div id="updateBanner" style="
    display:none;
    position:fixed;
    bottom:20px;
    left:50%;
    transform:translateX(-50%);
    background:#0b5ed7;
    color:white;
    padding:12px 20px;
    border-radius:8px;
    box-shadow:0 5px 15px rgba(0,0,0,0.3);
    z-index:9999;">
    Доступне оновлення 🚀
    <button id="updateBtn" style="
      margin-left:10px;
      background:white;
      color:#0b5ed7;
      border:none;
      padding:5px 10px;
      border-radius:5px;
      cursor:pointer;">
      Оновити
    </button>
  </div>

  <div id="authScreen">
    <h2>Вхід</h2>
    <input type="email" id="email" placeholder="Email">
    <input type="password" id="password" placeholder="Пароль">
    <button id="loginBtn">Увійти</button>
    <button id="registerBtn">Реєстрація</button>
    <p id="authError" style="color:red;"></p>
  </div>

  <div id="app" style="display:none;">
    <h2>Система запущена ✅</h2>
    <button id="logoutBtn">Вийти</button>
  </div>

  <!-- Firebase SDK -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, onAuthStateChanged, signOut } 
    from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
    import { getFirestore } 
    from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyDDroTHvtLRlgzsYvZzZ6ouabAj7gZ-9A0",
      authDomain: "oblik-stavka.firebaseapp.com",
      projectId: "oblik-stavka"
    };

    const firebaseApp = initializeApp(firebaseConfig);
    const auth = getAuth(firebaseApp);
    const db = getFirestore(firebaseApp);

    window.firebaseAuth = auth;
    window.firebaseDB = db;
    window.firebaseFns = {
      createUserWithEmailAndPassword,
      signInWithEmailAndPassword,
      onAuthStateChanged,
      signOut
    };
  </script>

  <!-- Main App -->
  <script type="module" src="./app.js"></script>

  <!-- Service Worker with Auto Update -->
  <script>
  if ("serviceWorker" in navigator) {
    navigator.serviceWorker.register("sw.js").then(reg => {

      reg.onupdatefound = () => {
        const newWorker = reg.installing;

        newWorker.onstatechange = () => {
          if (newWorker.state === "installed" && navigator.serviceWorker.controller) {
            document.getElementById("updateBanner").style.display = "block";
          }
        };
      };

    });

    document.getElementById("updateBtn").addEventListener("click", () => {
      window.location.reload();
    });
  }
  </script>

</body>
</html>
